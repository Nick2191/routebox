name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:integration
      - if: runner.os != 'Linux'
        run: npm run test:integration
      - run: npm run package
  package:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run vsix
      - uses: actions/upload-artifact@v4
        with:
          name: routebox-vsix
          path: routebox-*.vsix
